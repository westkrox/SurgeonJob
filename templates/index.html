<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Surgery Jobs — Berlin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #0d0d0d; color: #e5e5e5; font-family: 'Inter', system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
    .tag { display:inline-block; padding:2px 8px; border-radius:99px; font-size:11px; font-weight:600; margin:2px 2px 0 0; text-transform:uppercase; letter-spacing:0.02em; }
    .tag-trauma          { background:#2a1515; color:#fca5a5; }
    .tag-orthopedic_trauma{ background:#2a1f15; color:#fdba74; }
    .tag-general_surgery  { background:#152a1e; color:#6ee7b7; }
    .tag-vascular         { background:#151f2a; color:#7dd3fc; }
    .tag-thoracic         { background:#1e152a; color:#c4b5fd; }
    .tag-cardiac          { background:#2a1520; color:#f9a8d4; }
    .tag-pediatric_surgery{ background:#1a2a15; color:#bef264; }
    .tag-plastic_surgery  { background:#291a2a; color:#e9a8fd; }
    .tag-neurosurgery     { background:#15232a; color:#93c5fd; }
    .tag-surgery_other    { background:#2a2a2a; color:#9ca3af; }
    .level-badge { background:#1a1a2e; color:#a5b4fc; border-radius:4px; padding:1px 8px; font-size:10px; font-weight:700; text-transform:uppercase; }
    .berlin-badge { background:#152a1e; color:#4ade80; border-radius:4px; padding:1px 8px; font-size:10px; font-weight:700; }
    .source-badge { background:#1e293b; color:#7dd3fc; border-radius:4px; padding:1px 6px; font-size:10px; }
    .status-new         { border-left: 3px solid #6366f1; }
    .status-interested  { border-left: 3px solid #eab308; }
    .status-applied     { border-left: 3px solid #22c55e; }
    .status-dismissed   { border-left: 3px solid #6b7280; opacity:0.5; }
    input, select { background:#1a1a1a; border:1px solid #2a2a2a; color:#e5e5e5; border-radius:8px; padding:10px 12px; font-size:16px; }
    input:focus, select:focus { outline: 1px solid #6366f1; border-color:#6366f1; }
    .btn { padding:10px 16px; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; transition:all 0.15s; border:none; }
    .btn-primary { background:#4f46e5; color:white; }
    .btn-primary:active { background:#4338ca; }
    .btn-ghost { background:#1a1a1a; color:#9ca3af; border:1px solid #2a2a2a; }
    .btn-ghost:active { background:#2a2a2a; color:#e5e5e5; }
    .btn-sm { padding:6px 12px; font-size:12px; }
    .scrape-pulse { animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    ::-webkit-scrollbar { width:6px; } ::-webkit-scrollbar-track { background:#111; } ::-webkit-scrollbar-thumb { background:#333; border-radius:3px; }
    .drawer-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:40; }
    .drawer { position:fixed; top:0; right:0; bottom:0; width:85%; max-width:320px; background:#111; border-left:1px solid #2a2a2a; z-index:50; overflow-y:auto; padding:16px; transform:translateX(0); }
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:50; display:flex; align-items:center; justify-content:center; padding:16px; }
    .modal { background:#1a1a1a; border:1px solid #2a2a2a; border-radius:12px; padding:20px; width:100%; max-width:480px; }
    .hidden { display:none !important; }
  </style>
</head>
<body class="min-h-screen pb-6">

<header class="border-b border-[#2a2a2a] px-4 py-3 flex items-center justify-between sticky top-0 z-30" style="background:#0d0d0d;">
  <div class="flex items-center gap-2 min-w-0">
    <span class="text-lg font-bold text-indigo-400 flex-shrink-0">⚕ Surgery Jobs</span>
  </div>
  <div class="flex items-center gap-2 flex-shrink-0">
    <button id="scrape-btn" class="btn btn-primary btn-sm" onclick="triggerScrape()">Scrape</button>
    <button class="btn btn-ghost btn-sm" onclick="openFilters()">Filters</button>
  </div>
</header>

<div id="scrape-status-text" class="px-4 pt-2 text-xs text-gray-500"></div>

<main class="p-3">
  <div class="flex items-center justify-between mb-3 gap-2">
    <span id="count-label" class="text-sm text-gray-500"></span>
    <div class="flex items-center gap-1 text-xs">
      <button id="sort-newest" onclick="setSort('newest')" class="btn btn-ghost btn-sm">Newest</button>
      <button id="sort-berlin" onclick="setSort('berlin_first')" class="btn btn-ghost btn-sm">Berlin first</button>
    </div>
  </div>
  <div id="opportunity-list" class="space-y-3">
    <div class="text-center text-gray-500 py-16">Loading...</div>
  </div>
  <div class="text-center pt-4">
    <button class="btn btn-ghost btn-sm" onclick="openAddModal()">+ Add manually</button>
  </div>
</main>

<!-- Filters drawer -->
<div id="filter-drawer-overlay" class="drawer-overlay hidden" onclick="closeFilters()"></div>
<aside id="filter-drawer" class="drawer hidden">
  <div class="flex items-center justify-between mb-4">
    <h3 class="font-semibold">Filters</h3>
    <button class="btn btn-ghost btn-sm" onclick="closeFilters()">Close</button>
  </div>
  <div class="space-y-5">

    <div>
      <label class="text-xs text-gray-500 uppercase tracking-wider">Search</label>
      <input type="text" id="filter-search" placeholder="keyword..." class="w-full mt-1" oninput="applyFilters()" />
    </div>

    <div>
      <label class="text-xs text-gray-500 uppercase tracking-wider">Status</label>
      <div class="mt-1 space-y-2">
        <label class="flex items-center gap-2 text-sm"><input type="radio" name="status" value="all" checked onchange="applyFilters()" class="accent-indigo-500" /> All</label>
        <label class="flex items-center gap-2 text-sm"><input type="radio" name="status" value="new" onchange="applyFilters()" class="accent-indigo-500" /> <span class="text-indigo-400">New</span></label>
        <label class="flex items-center gap-2 text-sm"><input type="radio" name="status" value="interested" onchange="applyFilters()" class="accent-yellow-500" /> <span class="text-yellow-400">Interested</span></label>
        <label class="flex items-center gap-2 text-sm"><input type="radio" name="status" value="applied" onchange="applyFilters()" class="accent-green-500" /> <span class="text-green-400">Applied</span></label>
        <label class="flex items-center gap-2 text-sm"><input type="radio" name="status" value="dismissed" onchange="applyFilters()" class="accent-gray-500" /> <span class="text-gray-500">Dismissed</span></label>
      </div>
    </div>

    <div>
      <label class="text-xs text-gray-500 uppercase tracking-wider">Source</label>
      <select id="filter-source" class="w-full mt-1" onchange="applyFilters()">
        <option value="all">All sources</option>
      </select>
    </div>

    <label class="flex items-center gap-2 text-sm">
      <input type="checkbox" id="filter-berlin" onchange="applyFilters()" class="accent-green-500" />
      <span class="text-green-400">Berlin / Brandenburg area only</span>
    </label>

    <div>
      <label class="text-xs text-gray-500 uppercase tracking-wider">Level</label>
      <div class="mt-1 space-y-2">
        <label class="flex items-center gap-2 text-sm"><input type="checkbox" name="level" value="assistenzarzt" onchange="applyFilters()" class="accent-indigo-500" /> Assistenzarzt</label>
        <label class="flex items-center gap-2 text-sm"><input type="checkbox" name="level" value="facharzt" onchange="applyFilters()" class="accent-indigo-500" /> Facharzt</label>
        <label class="flex items-center gap-2 text-sm"><input type="checkbox" name="level" value="rotation" onchange="applyFilters()" class="accent-indigo-500" /> Rotation / Common Trunk</label>
      </div>
    </div>

    <div>
      <label class="text-xs text-gray-500 uppercase tracking-wider">Specialty</label>
      <div class="mt-1 space-y-2">
        <label class="flex items-center gap-2 text-sm"><input type="checkbox" name="specialty" value="trauma" onchange="applyFilters()" class="accent-red-500" /> <span class="text-red-300">Trauma surgery</span></label>
        <label class="flex items-center gap-2 text-sm"><input type="checkbox" name="specialty" value="orthopedic_trauma" onchange="applyFilters()" class="accent-orange-500" /> Orthopedics &amp; trauma</label>
        <label class="flex items-center gap-2 text-sm"><input type="checkbox" name="specialty" value="general_surgery" onchange="applyFilters()" class="accent-emerald-500" /> General surgery</label>
        <label class="flex items-center gap-2 text-sm"><input type="checkbox" name="specialty" value="vascular" onchange="applyFilters()" class="accent-sky-500" /> Vascular</label>
        <label class="flex items-center gap-2 text-sm"><input type="checkbox" name="specialty" value="thoracic" onchange="applyFilters()" class="accent-violet-500" /> Thoracic</label>
        <label class="flex items-center gap-2 text-sm"><input type="checkbox" name="specialty" value="cardiac" onchange="applyFilters()" class="accent-pink-500" /> Cardiac</label>
        <label class="flex items-center gap-2 text-sm"><input type="checkbox" name="specialty" value="pediatric_surgery" onchange="applyFilters()" class="accent-lime-500" /> Pediatric surgery</label>
        <label class="flex items-center gap-2 text-sm"><input type="checkbox" name="specialty" value="plastic_surgery" onchange="applyFilters()" class="accent-fuchsia-500" /> Plastic surgery</label>
        <label class="flex items-center gap-2 text-sm"><input type="checkbox" name="specialty" value="neurosurgery" onchange="applyFilters()" class="accent-blue-500" /> Neurosurgery</label>
      </div>
    </div>

    <label class="flex items-center gap-2 text-sm">
      <input type="checkbox" id="filter-fresh" onchange="applyFilters()" class="accent-indigo-500" />
      Found in last 7 days
    </label>

    <div class="pt-3 border-t border-[#2a2a2a] text-xs text-gray-500">
      <div>Last scrape:</div>
      <div id="last-scrape-time">
        {% if last_scrape and last_scrape.finished_at %}
          {{ last_scrape.finished_at[:16].replace('T',' ') }} UTC
        {% else %}
          Never
        {% endif %}
      </div>
    </div>

  </div>
</aside>

<!-- Add manually modal -->
<div id="add-modal" class="modal-overlay hidden" onclick="closeAddModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <h3 class="text-lg font-semibold mb-4">Add job manually</h3>
    <div class="space-y-3">
      <div>
        <label class="text-sm text-gray-400">Title *</label>
        <input type="text" id="add-title" class="w-full mt-1" placeholder="Assistenzarzt Chirurgie ..." />
      </div>
      <div>
        <label class="text-sm text-gray-400">URL *</label>
        <input type="text" id="add-url" class="w-full mt-1" placeholder="https://..." />
      </div>
      <div>
        <label class="text-sm text-gray-400">Employer</label>
        <input type="text" id="add-employer" class="w-full mt-1" placeholder="Hospital name" />
      </div>
      <div>
        <label class="text-sm text-gray-400">Location</label>
        <input type="text" id="add-location" class="w-full mt-1" placeholder="Berlin" />
      </div>
      <div>
        <label class="text-sm text-gray-400">Description</label>
        <textarea id="add-desc" class="w-full mt-1" rows="3" placeholder="Brief description..." style="background:#1a1a1a;border:1px solid #2a2a2a;color:#e5e5e5;border-radius:8px;padding:10px;resize:vertical;font-size:16px;"></textarea>
      </div>
    </div>
    <div class="flex gap-2 mt-4 justify-end">
      <button class="btn btn-ghost btn-sm" onclick="closeAddModal()">Cancel</button>
      <button class="btn btn-primary btn-sm" onclick="submitAdd()">Add</button>
    </div>
  </div>
</div>

<script>
let currentSort = 'newest';

function openFilters() {
  document.getElementById('filter-drawer').classList.remove('hidden');
  document.getElementById('filter-drawer-overlay').classList.remove('hidden');
}
function closeFilters() {
  document.getElementById('filter-drawer').classList.add('hidden');
  document.getElementById('filter-drawer-overlay').classList.add('hidden');
}

function setSort(s) {
  currentSort = s;
  document.getElementById('sort-newest').style.color = s === 'newest' ? '#e5e5e5' : '#9ca3af';
  document.getElementById('sort-berlin').style.color = s === 'berlin_first' ? '#e5e5e5' : '#9ca3af';
  loadOpportunities();
}

function levelLabel(lv) {
  const labels = { assistenzarzt: 'Assistenzarzt', facharzt: 'Facharzt', rotation: 'Rotation' };
  return labels[lv] || lv;
}

function renderCard(opp) {
  const specialties = (opp.specialty || []).map(s => `<span class="tag tag-${s}">${s.replace(/_/g,' ')}</span>`).join('');
  const levels = (opp.level || []).map(lv => `<span class="level-badge">${levelLabel(lv)}</span>`).join(' ');
  const berlin = opp.berlin_area ? `<span class="berlin-badge">📍 Berlin area</span>` : '';
  const source = `<span class="source-badge">${opp.source}</span>`;
  const employer = opp.employer ? `<div class="text-sm text-gray-400">${opp.employer}</div>` : '';
  const location = opp.location ? `<span class="text-xs text-gray-500">${opp.location}</span>` : '';
  const desc = opp.description ? `<p class="text-sm text-gray-400 mt-2" style="display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;">${opp.description.substring(0,260)}</p>` : '';

  const nextStatus = { new: 'interested', interested: 'applied', applied: 'new' };
  const nextLabel = { new: '★ Interested', interested: '✓ Applied', applied: '↺ Reset' };

  return `
    <div class="status-${opp.status} rounded-lg p-4" style="background:#1a1a1a;" id="card-${opp.id}">
      <div class="flex flex-wrap items-center gap-1 mb-1">
        ${source} ${berlin} ${levels} ${location}
      </div>
      <a href="${opp.url}" target="_blank" class="font-semibold text-white text-sm leading-snug block mt-1">
        ${opp.title}
      </a>
      ${employer}
      <div class="mt-2">${specialties}</div>
      ${desc}
      <div class="flex gap-2 mt-3">
        ${opp.status !== 'dismissed' ? `
        <button class="btn btn-ghost btn-sm flex-1" onclick="setStatus(${opp.id}, '${nextStatus[opp.status]}')">
          ${nextLabel[opp.status]}
        </button>` : ''}
        <button class="btn btn-ghost btn-sm" style="color:#6b7280;" onclick="setStatus(${opp.id}, '${opp.status === 'dismissed' ? 'new' : 'dismissed'}')">
          ${opp.status === 'dismissed' ? '↺' : '✕'}
        </button>
      </div>
    </div>
  `;
}

async function loadOpportunities() {
  const status = document.querySelector('input[name="status"]:checked')?.value || 'all';
  const source = document.getElementById('filter-source').value;
  const berlinOnly = document.getElementById('filter-berlin').checked ? '1' : '0';
  const search = document.getElementById('filter-search').value;
  const selectedLevels = [...document.querySelectorAll('input[name="level"]:checked')].map(el => el.value);
  const selectedSpecialties = [...document.querySelectorAll('input[name="specialty"]:checked')].map(el => el.value);
  const freshOnly = document.getElementById('filter-fresh').checked ? '7' : '';

  const params = new URLSearchParams({ status, source, berlin_only: berlinOnly, search, sort: currentSort });
  if (freshOnly) params.set('fresh_days', freshOnly);
  selectedLevels.forEach(l => params.append('level', l));
  selectedSpecialties.forEach(s => params.append('specialty', s));

  const res = await fetch('/api/opportunities?' + params);
  const opps = await res.json();

  const list = document.getElementById('opportunity-list');
  document.getElementById('count-label').textContent = `${opps.length} jobs`;

  if (!opps.length) {
    list.innerHTML = '<div class="text-center text-gray-500 py-16">No jobs found yet. Tap Scrape, or adjust filters.</div>';
    return;
  }

  list.innerHTML = opps.map(renderCard).join('');
}

async function setStatus(id, status) {
  await fetch(`/api/opportunities/${id}/status`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ status })
  });
  loadOpportunities();
}

function applyFilters() {
  loadOpportunities();
}

async function loadSources() {
  const res = await fetch('/api/sources');
  const sources = await res.json();
  const sel = document.getElementById('filter-source');
  sel.querySelectorAll('option:not(:first-child)').forEach(o => o.remove());
  sources.forEach(s => {
    const opt = document.createElement('option');
    opt.value = s; opt.textContent = s;
    sel.appendChild(opt);
  });
}

let scrapePoller = null;

async function triggerScrape() {
  const btn = document.getElementById('scrape-btn');
  btn.disabled = true;
  btn.textContent = 'Scraping...';
  btn.classList.add('scrape-pulse');

  await fetch('/api/scrape', { method: 'POST' });

  scrapePoller = setInterval(async () => {
    const res = await fetch('/api/scrape/status');
    const data = await res.json();
    document.getElementById('scrape-status-text').textContent = data.progress || '';
    if (!data.running) {
      clearInterval(scrapePoller);
      btn.disabled = false;
      btn.textContent = 'Scrape';
      btn.classList.remove('scrape-pulse');
      await loadSources();
      loadOpportunities();
    }
  }, 2000);
}

function openAddModal() { document.getElementById('add-modal').classList.remove('hidden'); }
function closeAddModal(e) {
  if (!e || e.target === document.getElementById('add-modal')) {
    document.getElementById('add-modal').classList.add('hidden');
  }
}

async function submitAdd() {
  const title = document.getElementById('add-title').value.trim();
  const url = document.getElementById('add-url').value.trim();
  const employer = document.getElementById('add-employer').value.trim();
  const location = document.getElementById('add-location').value.trim();
  const description = document.getElementById('add-desc').value.trim();

  if (!title || !url) { alert('Title and URL are required.'); return; }

  await fetch('/api/opportunities', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ title, url, employer, location, description })
  });

  document.getElementById('add-title').value = '';
  document.getElementById('add-url').value = '';
  document.getElementById('add-employer').value = '';
  document.getElementById('add-location').value = '';
  document.getElementById('add-desc').value = '';
  closeAddModal();
  loadOpportunities();
}

setSort('newest');
loadSources();
loadOpportunities();
</script>
</body>
</html>
