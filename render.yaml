services:
  - type: web
    name: surgeon-job-scraper
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 600
    envVars:
      - key: APP_PASSWORD
        sync: false
      - key: SCRAPE_TOKEN
        sync: false
      - key: PYTHONUNBUFFERED
        value: "1"
