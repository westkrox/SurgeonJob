name: Trigger scrape

on:
  schedule:
    - cron: "0 6,14,20 * * *"
  workflow_dispatch: {}

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Call /api/scrape on the deployed app
        run: |
          curl -f -X POST "${{ secrets.RENDER_APP_URL }}/api/scrape?token=${{ secrets.SCRAPE_TOKEN }}"
